<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f0f2f5;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box {
            width: 380px;
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, .1);
        }
    </style>
</head>

<body>

    <div class="box">
        <h4 class="text-center text-primary mb-3">Register</h4>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <input class="form-control mb-2" name="username" placeholder="Username" required>
            <input class="form-control mb-2" name="email" placeholder="Email" required>
            <input class="form-control mb-2" name="mobile" placeholder="Mobile" required>
            <input class="form-control mb-2" type="password" name="password" placeholder="Password" required>

            <select class="form-control mb-2" name="role">
                <option value="user">User</option>
                <option value="store">Store</option>
            </select>

            <input class="form-control mb-3" type="file" name="photo">

            <button class="btn btn-primary w-100">Register</button>

            <div class="text-center mt-2">
                <a href="/">Already have account?</a>
            </div>
        </form>
    </div>

</body>

</html>
